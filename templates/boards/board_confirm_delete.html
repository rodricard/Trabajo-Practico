{% extends 'base.html' %}
{% block title %}Eliminar tablero{% endblock %}

{% block content %}
<div class="auth-container">
    <div class="auth-card">
        <h1>Eliminar tablero</h1>
        <p>¿Estás seguro de que quieres eliminar <strong>{{ board.title }}</strong>?</p>
        <p class="danger-text">Esta acción eliminará todas las listas y tarjetas. No se puede deshacer.</p>
        <form method="post" style="display:flex; gap: 1rem; margin-top: 1.5rem;">
            {% csrf_token %}
            <button type="submit" class="btn btn-danger">Sí, eliminar</button>
            <a href="{% url 'board_detail' board.pk %}" class="btn btn-ghost">Cancelar</a>
        </form>
    </div>
</div>
{% endblock %}
